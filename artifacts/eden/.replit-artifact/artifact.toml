kind = "web"
previewPath = "/"
title = "Eden AI Workspace"
version = "1.0.0"
id = "artifacts/eden"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20421

[services.development]
run = "pnpm --filter @workspace/eden run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/eden", "run", "build" ]
publicDir = "artifacts/eden/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20421"
BASE_PATH = "/"
